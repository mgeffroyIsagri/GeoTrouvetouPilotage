name: Build and deploy to Azure Web App - geotrouvetouweb

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      # --- Build Angular (production) ---
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Angular dependencies
        run: npm ci
        working-directory: frontend

      - name: Build Angular (production)
        run: npx ng build --configuration=production
        working-directory: frontend

      - name: Copy Angular build to backend/static
        run: |
          rm -rf backend/static
          cp -r frontend/dist/geotrouvetou-pilotage/browser backend/static

      # --- Validate Python dependencies ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies (validation)
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install -r backend/requirements.txt

      # --- Package backend for deployment ---
      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            backend/
            !antenv/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_308EDDEA5F1345A089E660FD434EC151 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_D78652BAAB6B49699C126BE5AF5C707D }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_D9A9B735DB4B47A88C97BF79A6009B80 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'geotrouvetouweb'
          slot-name: 'Production'
